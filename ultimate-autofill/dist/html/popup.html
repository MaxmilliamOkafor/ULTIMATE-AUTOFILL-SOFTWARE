<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ultimate Autofill</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:380px;min-height:460px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:#1a1a2e;background:#f8f9fa}
    .header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px;display:flex;align-items:center;gap:10px}
    .header h1{font-size:16px;font-weight:600}
    .header .ver{font-size:11px;opacity:.8}
    .header .credits{font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:10px;margin-left:auto}
    .status-bar{padding:10px 16px;background:#fff;border-bottom:1px solid #e9ecef;display:flex;justify-content:space-between;align-items:center}
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
    .dot.on{background:#28a745}.dot.off{background:#dc3545}
    .actions{padding:10px 16px;display:flex;flex-direction:column;gap:8px}
    .btn{display:flex;align-items:center;gap:8px;padding:11px 14px;border:1px solid #dee2e6;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;transition:all .15s}
    .btn:hover{background:#f1f3f5;border-color:#adb5bd}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;font-weight:600}
    .btn-primary:hover{opacity:.9}
    .btn-stop{background:#dc3545;color:#fff;border:none;font-weight:600}
    .btn-stop:hover{opacity:.9}
    .btn-success{background:#28a745;color:#fff;border:none;font-weight:600}
    .btn-success:hover{opacity:.9}
    .btn-warning{background:#ffc107;color:#1a1a2e;border:none;font-weight:600}
    .btn-warning:hover{opacity:.9}
    .btn .icon{font-size:18px}
    .section-label{padding:4px 16px 2px;font-size:11px;font-weight:600;color:#868e96;text-transform:uppercase;letter-spacing:.5px}
    .stats{padding:10px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .stat{background:#fff;border:1px solid #e9ecef;border-radius:8px;padding:8px;text-align:center}
    .stat .val{font-size:18px;font-weight:700;color:#667eea}
    .stat .lbl{font-size:10px;color:#868e96;margin-top:2px}
    .footer{padding:10px 16px;border-top:1px solid #e9ecef;text-align:center}
    .footer a{color:#667eea;text-decoration:none;font-size:12px}
    .footer a:hover{text-decoration:underline}
    #atsInfo{padding:8px 16px;background:#e8f4fd;border-bottom:1px solid #bee5eb;font-size:12px;color:#0c5460;display:none}
    .hidden{display:none!important}
    .auto-apply-status{padding:8px 16px;background:#d4edda;border-bottom:1px solid #c3e6cb;font-size:12px;color:#155724;display:none}
    .auto-apply-status.active{display:block}
    .divider{height:1px;background:#e9ecef;margin:4px 16px}
  </style>
</head>
<body>
  <div class="header">
    <div><h1>Ultimate Autofill</h1><span class="ver">v2.0.0</span></div>
    <span id="creditsDisplay" class="credits">Unlimited</span>
  </div>
  <div id="atsInfo"></div>
  <div id="autoApplyStatus" class="auto-apply-status"></div>
  <div class="status-bar">
    <span><span id="dot" class="dot off"></span><span id="statusText">Ready</span></span>
    <span id="respCount" style="font-size:12px;color:#868e96">0 responses</span>
  </div>

  <div class="section-label">Autofill</div>
  <div class="actions">
    <button id="btnFill" class="btn btn-primary"><span class="icon">&#9889;</span> Start Autofill</button>
    <button id="btnStop" class="btn btn-stop hidden"><span class="icon">&#9632;</span> Stop</button>
  </div>

  <div class="divider"></div>
  <div class="section-label">Auto-Apply</div>
  <div class="actions">
    <button id="btnAutoApply" class="btn btn-success"><span class="icon">&#9654;</span> Start Auto-Apply (All Jobs)</button>
    <button id="btnAutoApplyImported" class="btn btn-success"><span class="icon">&#128229;</span> Start Applying to Imported Jobs</button>
    <button id="btnStopAutoApply" class="btn btn-stop hidden"><span class="icon">&#9632;</span> Stop Auto-Apply</button>
    <button id="btnPauseAutoApply" class="btn btn-warning hidden"><span class="icon">&#9208;</span> Pause</button>
    <button id="btnResumeAutoApply" class="btn btn-success hidden"><span class="icon">&#9654;</span> Resume</button>
  </div>

  <div class="divider"></div>
  <div class="actions">
    <button id="btnResponses" class="btn"><span class="icon">&#128221;</span> Saved Responses</button>
    <button id="btnQueue" class="btn"><span class="icon">&#128203;</span> Job Queue & CSV Import</button>
  </div>

  <div class="stats">
    <div class="stat"><div id="fieldsFilled" class="val">0</div><div class="lbl">Filled</div></div>
    <div class="stat"><div id="queueCount" class="val">0</div><div class="lbl">Queued</div></div>
    <div class="stat"><div id="appliedCount" class="val">0</div><div class="lbl">Applied</div></div>
  </div>
  <div class="footer"><a id="openOptions" href="#">Open Settings</a></div>
  <script src="../popup.js"></script>
</body>
</html>
