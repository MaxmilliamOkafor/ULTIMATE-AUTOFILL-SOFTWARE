<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/tabs/missingDetails.df89bfed.css">
  <title>OptimHire Job Auto-Applier</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Hide referral / affiliate section in sidepanel */
    [class*="referral"],[class*="Referral"],[id*="referral"],
    [data-testid*="referral"],[class*="affiliate"],
    .referral-section,.referral-card,.referral-banner,
    [class*="earnCredit"],[class*="inviteFriend"],[class*="invite-friend"],
    [class*="ReferralScreen"]{display:none!important}

    /* Minimal auto-trigger toggle at bottom */
    .oh-toggle-row{
      position:fixed;bottom:0;left:0;right:0;z-index:99999;
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 14px;background:#0f1117;border-top:1px solid #2d2f3a;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    }
    .oh-toggle-label{font-size:11px;color:#6b7280}
    .oh-toggle{
      position:relative;width:32px;height:18px;background:#374151;
      border-radius:9px;cursor:pointer;border:none;padding:0;
      transition:background .2s;
    }
    .oh-toggle.active{background:#6366f1}
    .oh-toggle::after{
      content:'';position:absolute;top:2px;left:2px;
      width:14px;height:14px;border-radius:50%;background:#fff;
      transition:transform .2s;
    }
    .oh-toggle.active::after{transform:translateX(14px)}
  </style>
</head>
<body>
  <div id="__plasmo"></div>
  <script src="/sidepanel.b7741352.js" defer></script>

  <!-- Auto-trigger toggle (minimal — all other UI is handled by OptimHire's native React) -->
  <div class="oh-toggle-row">
    <span class="oh-toggle-label">Auto-fill on supported ATS pages</span>
    <button class="oh-toggle active" id="oh-auto-trigger-toggle"></button>
  </div>

  <!-- CSP-safe: all JS in external file -->
  <script src="/assets/sidepanel-patch.js" defer></script>
</body>
</html>
