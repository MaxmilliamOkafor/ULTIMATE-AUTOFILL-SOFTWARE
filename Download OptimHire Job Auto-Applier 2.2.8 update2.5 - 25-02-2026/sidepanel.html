<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="/tabs/missingDetails.df89bfed.css">
  <title>OptimHire Job Auto-Applier</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Hide referral / affiliate section in sidepanel */
    [class*="referral"],
    [class*="Referral"],
    [id*="referral"],
    [data-testid*="referral"],
    [class*="affiliate"],
    .referral-section,
    .referral-card,
    .referral-banner,
    [class*="earnCredit"],
    [class*="inviteFriend"],
    [class*="invite-friend"],
    [class*="ReferralScreen"] {
      display: none !important
    }

    /* ── Bottom toolbar ── */
    .oh-bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 99999;
      background: #0f1117;
      border-top: 1px solid #2d2f3a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #e2e8f0;
    }

    /* CSV import section (collapsible) */
    .csv-section {
      display: none;
      padding: 12px 14px;
      border-bottom: 1px solid #1e2030
    }

    .csv-section.open {
      display: block
    }

    .csv-section textarea {
      width: 100%;
      height: 80px;
      background: #1a1e2e;
      border: 1px solid #2d2f3a;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 11px;
      padding: 8px;
      resize: vertical;
      font-family: monospace;
    }

    .csv-section textarea::placeholder {
      color: #4b5563
    }

    .csv-section textarea:focus {
      outline: none;
      border-color: #6366f1
    }

    .csv-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      align-items: center
    }

    .csv-file-label {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: rgba(99, 102, 241, .15);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, .25);
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: background .15s;
    }

    .csv-file-label:hover {
      background: rgba(99, 102, 241, .25)
    }

    .csv-file-input {
      display: none
    }

    .csv-start-btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }

    .csv-start-btn:hover {
      box-shadow: 0 2px 10px rgba(99, 102, 241, .4);
      transform: translateY(-1px)
    }

    .csv-start-btn:active {
      transform: scale(.97)
    }

    .csv-start-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none
    }

    .csv-counter {
      font-size: 10px;
      color: #64748b;
      margin-top: 6px
    }

    .csv-counter b {
      color: #a78bfa
    }

    /* Toggle row */
    .oh-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
    }

    .oh-toggle-label {
      font-size: 11px;
      color: #6b7280
    }

    .oh-toggle {
      position: relative;
      width: 32px;
      height: 18px;
      background: #374151;
      border-radius: 9px;
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background .2s;
    }

    .oh-toggle.active {
      background: #6366f1
    }

    .oh-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform .2s;
    }

    .oh-toggle.active::after {
      transform: translateX(14px)
    }

    /* CSV toggle button (header) */
    .csv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      border-bottom: 1px solid #1e2030;
    }

    .csv-header:hover {
      background: rgba(99, 102, 241, .05)
    }

    .csv-header-left {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .csv-header-icon {
      font-size: 13px
    }

    .csv-header-title {
      font-size: 11.5px;
      font-weight: 600;
      color: #a5b4fc
    }

    .csv-header-badge {
      font-size: 10px;
      font-weight: 700;
      color: #4ade80;
      background: rgba(74, 222, 128, .12);
      padding: 1px 7px;
      border-radius: 10px;
    }

    .csv-header-arrow {
      font-size: 10px;
      color: #6b7280;
      transition: transform .2s
    }

    .csv-section.open~.csv-header .csv-header-arrow,
    .csv-header.expanded .csv-header-arrow {
      transform: rotate(180deg)
    }
  </style>
</head>

<body>
  <div id="__plasmo"></div>
  <script src="/sidepanel.b7741352.js" defer></script>

  <!-- ═══ Bottom Bar: CSV Import + Toggle ═══ -->
  <div class="oh-bottom-bar">
    <!-- CSV toggle header -->
    <div class="csv-header" id="csvToggleHeader">
      <div class="csv-header-left">
        <span class="csv-header-icon">📋</span>
        <span class="csv-header-title">Import Job URLs</span>
        <span class="csv-header-badge" id="csvBadge" style="display:none">0 queued</span>
      </div>
      <span class="csv-header-arrow" id="csvArrow">▼</span>
    </div>

    <!-- CSV import section (hidden by default) -->
    <div class="csv-section" id="csvSection">
      <textarea id="csvUrls"
        placeholder="Paste job URLs here, one per line...&#10;https://jobs.lever.co/company/12345&#10;https://boards.greenhouse.io/company/jobs/67890"></textarea>
      <div class="csv-row">
        <label class="csv-file-label">
          📄 CSV File
          <input type="file" accept=".csv,.txt" class="csv-file-input" id="csvFileInput">
        </label>
        <button class="csv-start-btn" id="csvStartBtn">⚡ Add to Queue & Start</button>
      </div>
      <div class="csv-counter" id="csvStatus"></div>
    </div>

    <!-- Auto-trigger toggle -->
    <div class="oh-toggle-row">
      <span class="oh-toggle-label">Auto-fill on supported ATS pages</span>
      <button class="oh-toggle active" id="oh-auto-trigger-toggle"></button>
    </div>
  </div>

  <!-- CSP-safe: all JS in external file -->
  <script src="/assets/sidepanel-patch.js" defer></script>
</body>

</html>
