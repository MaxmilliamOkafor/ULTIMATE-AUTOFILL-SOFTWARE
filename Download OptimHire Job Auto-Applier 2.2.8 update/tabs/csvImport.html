<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Job Queue – OptimHire</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--surface:#161616;--surface2:#1f1f1f;--surface3:#2a2a2a;
      --border:#2e2e2e;--primary:#3b82f6;--primary-h:#2563eb;
      --success:#16a34a;--danger:#dc2626;--warn:#d97706;
      --text:#f1f5f9;--muted:#6b7280;--radius:10px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      font-size:14px;line-height:1.5;}
    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* ── Layout ── */
    .page{max-width:860px;margin:0 auto;padding:20px 16px 60px}

    /* ── Header ── */
    .hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .hdr h1{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .badge{display:inline-flex;align-items:center;padding:2px 9px;
           border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
    .badge-blue{background:#1d3a6e;color:#60a5fa}
    .badge-gray{background:#1f1f1f;color:#9ca3af}
    .badge-green{background:#14532d;color:#86efac}
    .badge-red{background:#450a0a;color:#fca5a5}
    .badge-yellow{background:#431407;color:#fcd34d}
    .badge-purple{background:#2e1065;color:#c084fc}

    /* ── Card ── */
    .card{background:var(--surface);border:1px solid var(--border);
          border-radius:var(--radius);padding:16px;margin-bottom:14px}
    .card-title{font-size:.85rem;font-weight:700;color:var(--muted);
                text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;
                display:flex;align-items:center;gap:6px}

    /* ── Add Jobs Panel ── */
    .add-row{display:flex;gap:8px;margin-bottom:10px}
    .add-row textarea{flex:1;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;
      resize:none;height:72px;outline:none;transition:border-color .2s}
    .add-row textarea:focus{border-color:var(--primary)}
    .add-row textarea::placeholder{color:var(--muted)}

    /* ── Drag zone ── */
    .drop-zone{border:1.5px dashed var(--border);border-radius:8px;
               padding:18px;text-align:center;cursor:pointer;transition:all .2s;
               background:var(--surface2);color:var(--muted);margin-bottom:10px}
    .drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);
      background:rgba(59,130,246,.06);color:var(--text)}
    .drop-zone input{display:none}
    .drop-zone svg{margin:0 auto 6px;display:block;opacity:.5}
    .drop-zone p{font-size:12px;line-height:1.6}
    .drop-zone .ats-list{font-size:11px;color:var(--muted);margin-top:4px}
    .browse-btn{display:inline-block;margin-top:8px;background:var(--surface3);
      border:1px solid var(--border);color:var(--text);border-radius:6px;
      padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer}

    /* ── Progress bar ── */
    .progress-wrap{height:3px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);
                   transition:width .4s;border-radius:2px}

    /* ── Stats strip ── */
    .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .stat{background:var(--surface);border:1px solid var(--border);
          border-radius:8px;padding:8px 14px;flex:1 1 90px;text-align:center}
    .stat .val{font-size:1.3rem;font-weight:700;color:var(--primary)}
    .stat .lbl{font-size:11px;color:var(--muted);margin-top:1px}

    /* ── Controls bar ── */
    .ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .ctrl input[type=text]{flex:1;min-width:160px;background:var(--surface2);
      border:1px solid var(--border);border-radius:7px;color:var(--text);
      padding:7px 12px;font-size:13px;outline:none}
    .ctrl input[type=text]:focus{border-color:var(--primary)}
    .ctrl select{background:var(--surface2);border:1px solid var(--border);
      border-radius:7px;color:var(--text);padding:7px 10px;font-size:13px;outline:none}
    button{cursor:pointer;border:none;border-radius:7px;padding:7px 14px;
           font-size:13px;font-weight:600;transition:opacity .15s,transform .1s}
    button:hover{opacity:.85}
    button:active{transform:scale(.97)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-success{background:var(--success);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-ghost{background:var(--surface3);border:1px solid var(--border);color:var(--text)}
    .btn-start{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;
               display:flex;align-items:center;gap:6px;padding:8px 18px;
               box-shadow:0 2px 12px rgba(59,130,246,.35)}
    .btn-pause{background:var(--surface3);border:1px solid var(--border);color:var(--text)}
    .sep{width:1px;height:22px;background:var(--border);margin:0 2px}

    /* ── Table ── */
    .tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{background:var(--surface2);padding:9px 12px;text-align:left;
             color:var(--muted);font-weight:600;font-size:12px;
             border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr:hover{background:rgba(59,130,246,.04)}
    td{padding:8px 12px;border-bottom:1px solid rgba(46,46,46,.7);vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    td.url-cell{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    td.url-cell a{color:#60a5fa;text-decoration:none}
    td.url-cell a:hover{text-decoration:underline}
    input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--primary)}

    /* ── Status badges ── */
    .st{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
        border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
    .st-pending {background:#1e3a5f;color:#60a5fa}
    .st-running {background:#1a3a1a;color:#4ade80}
    .st-done    {background:#14532d;color:#86efac}
    .st-failed  {background:#450a0a;color:#fca5a5}
    .st-skipped {background:#2d2000;color:#fcd34d}
    .st-duplicate{background:#2e1065;color:#c084fc}

    /* ── Row actions ── */
    .row-actions{display:flex;gap:4px}
    .row-actions button{padding:4px 8px;font-size:11px}

    /* ── Pagination ── */
    .pager{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap}
    .pager button{padding:5px 11px;font-size:12px}
    .pager button.active{background:var(--primary);color:#fff}

    /* ── Empty state ── */
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    .empty svg{margin:0 auto 12px;display:block;opacity:.3}

    /* ── Toast ── */
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
           background:#1d4ed8;color:#fff;padding:10px 20px;border-radius:8px;
           font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;
           z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.5)}
    #toast.show{opacity:1}
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="hdr">
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
      </svg>
      Job Queue
    </h1>
    <span class="badge badge-gray" id="badgeTotal">0 total</span>
    <span class="badge badge-blue" id="badgePending">0 pending</span>
    <span class="badge badge-green" id="badgeDone">0 applied</span>
    <span class="badge badge-red" id="badgeFailed" style="display:none">0 failed</span>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- ADD JOBS PANEL -->
  <div class="card">
    <div class="card-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Add Jobs to Queue
    </div>
    <div class="add-row">
      <textarea id="urlInput" placeholder="Paste job URL(s) — separate multiple with commas or new lines&#10;e.g. https://jobs.lever.co/company/job-id&#10;     https://company.greenhouse.io/jobs/123"></textarea>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn-primary" id="btnAdd" style="height:100%;white-space:nowrap">Add URL(s)</button>
      </div>
    </div>
    <!-- Drag & Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <input type="file" id="csvFile" accept=".csv,.txt"/>
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/>
        <line x1="9" y1="15" x2="12" y2="18"/><line x1="15" y1="15" x2="12" y2="18"/>
      </svg>
      <p><strong>Drag &amp; drop a CSV file</strong> with job URLs</p>
      <p class="ats-list">Supports Workday · Greenhouse · Lever · SmartRecruiters · iCIMS · LinkedIn · Indeed · HiringCafe · Oracle · BambooHR · Ashby · Jobvite</p>
      <span class="browse-btn" onclick="document.getElementById('csvFile').click()">Browse Files</span>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrl">
    <button class="btn-ghost" id="btnSelectPending" style="display:flex;align-items:center;gap:5px">
      <input type="checkbox" id="selectPendingCheck" style="pointer-events:none" readonly/>
      <span id="selectPendingLabel">Select All Pending (0)</span>
    </button>
    <button class="btn-ghost" id="btnDeselectAll">Deselect All</button>
    <div class="sep"></div>
    <button class="btn-danger" id="btnDeleteSelected">Delete Selected</button>
    <button class="btn-ghost" id="btnClearAll">Clear All</button>
    <div class="sep"></div>
    <input type="text" id="searchInput" placeholder="🔍 Search URLs…" style="max-width:200px"/>
    <select id="filterStatus">
      <option value="">All statuses</option>
      <option value="pending">Pending</option>
      <option value="running">Running</option>
      <option value="done">Applied</option>
      <option value="failed">Failed</option>
      <option value="skipped">Skipped</option>
      <option value="duplicate">Duplicate</option>
    </select>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="btn-pause" id="btnPause" style="display:none">⏸ Pause</button>
      <button class="btn-start" id="btnStart">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span id="btnStartLabel">Start Automation (0 jobs)</span>
      </button>
    </div>
  </div>

  <!-- EXPORT ROW -->
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="btn-ghost" id="btnExportQueue" style="font-size:12px">⬇ Export Queue CSV</button>
    <button class="btn-ghost" id="btnExportApplied" style="font-size:12px">⬇ Export Applied Jobs</button>
    <button class="btn-ghost" id="btnSortNewest" style="font-size:12px">↕ Sort Newest</button>
  </div>

  <!-- QUEUE TABLE -->
  <div class="card" style="padding:0">
    <div class="tbl-wrap">
      <table id="jobTable">
        <thead>
          <tr>
            <th style="width:34px"><input type="checkbox" id="masterCheck"/></th>
            <th>#</th>
            <th>URL</th>
            <th>Platform</th>
            <th>Added</th>
            <th>Status</th>
            <th style="width:110px">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="pager" id="pagination"></div>
</div>
<div id="toast"></div>

<script>
/* ─────────────────────────────────────────────────────────
 * OptimHire Job Queue Manager
 * Uses chrome.storage.local directly — no message passing
 * ───────────────────────────────────────────────────────── */
const KEY_QUEUE   = 'csvJobQueue';
const KEY_APPLIED = 'appliedJobs';
const PAGE_SIZE   = 50;

let queue    = [];
let filtered = [];
let page     = 1;
let isRunning= false;
let runTabId = null;

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* Toast */
function toast(msg, dur=3000){
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}

/* Detect platform from URL */
function platform(url){
  try{
    const h=new URL(url).hostname.toLowerCase();
    if(h.includes('linkedin'))        return 'LinkedIn';
    if(h.includes('indeed'))          return 'Indeed';
    if(h.includes('hiring.cafe'))     return 'HiringCafe';
    if(h.includes('myworkdayjobs')||h.includes('workday')) return 'Workday';
    if(h.includes('greenhouse'))      return 'Greenhouse';
    if(h.includes('lever'))           return 'Lever';
    if(h.includes('smartrecruiters')) return 'SmartRecruiters';
    if(h.includes('oraclecloud')||h.includes('taleo')) return 'Oracle';
    if(h.includes('icims'))           return 'iCIMS';
    if(h.includes('bamboohr'))        return 'BambooHR';
    if(h.includes('ashbyhq'))         return 'Ashby';
    if(h.includes('breezy'))          return 'BreezyHR';
    if(h.includes('jobvite'))         return 'Jobvite';
    if(h.includes('workable'))        return 'Workable';
    if(h.includes('teamtailor'))      return 'Teamtailor';
    if(h.includes('bullhorn'))        return 'Bullhorn';
    return 'Company Site';
  }catch{return 'Unknown'}
}

function normalize(url){
  try{
    const u=new URL(url);
    ['utm_source','utm_medium','utm_campaign','ref','referer','source','fbclid']
      .forEach(p=>u.searchParams.delete(p));
    return u.origin+u.pathname;
  }catch{return url}
}

/* ─── Storage helpers (direct, no messages) ─── */
function loadQueue(){ return new Promise(res=>chrome.storage.local.get(KEY_QUEUE,d=>{queue=d[KEY_QUEUE]||[];res();})); }
function saveQueue(){ chrome.storage.local.set({[KEY_QUEUE]:queue}); }
function loadApplied(){ return new Promise(res=>chrome.storage.local.get(KEY_APPLIED,d=>res(d[KEY_APPLIED]||[]))); }

/* ─── Parse URLs from text ─── */
function parseUrls(text){
  const urls=new Set();
  text.split(/[\r\n,]+/).map(s=>s.replace(/["'\s]/g,''))
    .filter(s=>s.startsWith('http'))
    .forEach(u=>urls.add(u));
  return [...urls];
}

/* ─── Add to queue ─── */
async function addUrls(urls){
  const applied=await loadApplied();
  const appliedSet=new Set(applied.map(normalize));
  const existing=new Set(queue.map(j=>normalize(j.url)));
  let added=0, dupes=0;
  for(const url of urls){
    if(!url.startsWith('http')) continue;
    const norm=normalize(url);
    if(existing.has(norm)){dupes++;continue;}
    existing.add(norm);
    queue.push({
      id:crypto.randomUUID(),url,
      platform:platform(url),
      addedAt:Date.now(),
      status:appliedSet.has(norm)?'duplicate':'pending',
      note:''
    });
    added++;
  }
  saveQueue(); render();
  toast(`✅ Added ${added} job(s)${dupes?` · ${dupes} skipped (already queued)`:''}`);
}

/* ─── Render table ─── */
const STATUS_CLASS={pending:'st-pending',running:'st-running',done:'st-done',failed:'st-failed',skipped:'st-skipped',duplicate:'st-duplicate'};
const STATUS_LABEL={pending:'Pending',running:'Running',done:'Applied',failed:'Failed',skipped:'Skipped',duplicate:'Duplicate'};

function render(){
  // Filter
  const q=($('searchInput').value||'').toLowerCase();
  const st=$('filterStatus').value;
  filtered=queue.filter(j=>{
    if(st&&j.status!==st) return false;
    if(q&&!j.url.toLowerCase().includes(q)) return false;
    return true;
  });

  // Stats
  const counts={pending:0,running:0,done:0,failed:0,skipped:0,duplicate:0};
  queue.forEach(j=>{if(counts[j.status]!==undefined) counts[j.status]++;});
  $('badgeTotal').textContent=`${queue.length} total`;
  $('badgePending').textContent=`${counts.pending} pending`;
  $('badgeDone').textContent=`${counts.done} applied`;
  $('badgeFailed').textContent=`${counts.failed} failed`;
  $('badgeFailed').style.display=counts.failed?'inline-flex':'none';

  const done=counts.done+counts.failed+counts.skipped+counts.duplicate;
  const pct=queue.length?Math.round(done/queue.length*100):0;
  $('progressFill').style.width=pct+'%';

  // Select pending label
  $('selectPendingLabel').textContent=`Select All Pending (${counts.pending})`;
  $('btnStartLabel').textContent=`Start Automation (${counts.pending} jobs)`;

  // Paginate
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(page>totalPages) page=totalPages;
  const start=(page-1)*PAGE_SIZE;
  const slice=filtered.slice(start,start+PAGE_SIZE);

  const tbody=$('tableBody');
  if(!slice.length){
    tbody.innerHTML=`<tr><td colspan="7"><div class="empty">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>${queue.length?'No jobs match your filter.':'No jobs yet — add URLs above or import a CSV.'}</p>
    </div></td></tr>`;
  } else {
    tbody.innerHTML=slice.map((j,i)=>{
      const short=j.url.length>65?j.url.slice(0,62)+'…':j.url;
      return `<tr data-id="${j.id}">
        <td><input type="checkbox" class="row-check" data-id="${j.id}"/></td>
        <td style="color:var(--muted)">${start+i+1}</td>
        <td class="url-cell"><a href="${j.url}" target="_blank" title="${j.url}">${short}</a></td>
        <td><span class="badge badge-gray">${j.platform}</span></td>
        <td style="color:var(--muted);font-size:12px">${j.addedAt?new Date(j.addedAt).toLocaleDateString():''}</td>
        <td><span class="st ${STATUS_CLASS[j.status]||'st-pending'}">${STATUS_LABEL[j.status]||j.status}</span></td>
        <td><div class="row-actions">
          <button class="btn-primary" style="padding:4px 8px;font-size:11px" onclick="applyOne('${j.id}')">Apply</button>
          <button class="btn-ghost" style="padding:4px 8px;font-size:11px" onclick="retryOne('${j.id}')">↻</button>
          <button class="btn-danger" style="padding:4px 8px;font-size:11px" onclick="deleteOne('${j.id}')">✕</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  // Pagination
  renderPages(totalPages);
}

function renderPages(total){
  const el=$('pagination');
  if(total<=1){el.innerHTML='';return;}
  let h='';
  const s=Math.max(1,page-3), e=Math.min(total,page+3);
  if(s>1) h+=`<button class="btn-ghost" onclick="goPage(1)">1</button>${s>2?'<span style="color:var(--muted)">…</span>':''}`;
  for(let i=s;i<=e;i++) h+=`<button class="${i===page?'btn-primary':'btn-ghost'}" onclick="goPage(${i})">${i}</button>`;
  if(e<total) h+=`${e<total-1?'<span style="color:var(--muted)">…</span>':''}<button class="btn-ghost" onclick="goPage(${total})">${total}</button>`;
  el.innerHTML=h;
}
window.goPage=p=>{page=p;render();};

/* ─── Row actions ─── */
window.applyOne=id=>{
  const j=queue.find(q=>q.id===id);
  if(!j) return;
  j.status='running'; saveQueue(); render();
  try{ chrome.tabs.create({url:j.url,active:true}); }catch(e){ toast('Could not open tab: '+e.message); }
  toast('Opening: '+j.url.slice(0,55)+'…');
};
window.retryOne=id=>{
  const j=queue.find(q=>q.id===id);
  if(j){j.status='pending';j.note='';saveQueue();render();toast('Reset to pending');}
};
window.deleteOne=id=>{
  queue=queue.filter(q=>q.id!==id); saveQueue(); render();
  toast('Job removed');
};

/* ─── Bulk select ─── */
function getSelected(){ return [...document.querySelectorAll('.row-check:checked')].map(el=>el.dataset.id); }

$('btnSelectPending').addEventListener('click',()=>{
  document.querySelectorAll('.row-check').forEach(c=>{
    const j=queue.find(q=>q.id===c.dataset.id);
    c.checked=j&&j.status==='pending';
  });
  $('selectPendingCheck').checked=true;
});
$('btnDeselectAll').addEventListener('click',()=>{
  document.querySelectorAll('.row-check').forEach(c=>c.checked=false);
  $('masterCheck').checked=false; $('selectPendingCheck').checked=false;
});
$('masterCheck').addEventListener('change',function(){
  document.querySelectorAll('.row-check').forEach(c=>c.checked=this.checked);
});
$('btnDeleteSelected').addEventListener('click',()=>{
  const ids=new Set(getSelected());
  if(!ids.size){toast('No jobs selected');return;}
  if(!confirm(`Delete ${ids.size} selected job(s)?`)) return;
  queue=queue.filter(j=>!ids.has(j.id)); saveQueue(); render();
  toast(`${ids.size} job(s) deleted`);
});
$('btnClearAll').addEventListener('click',()=>{
  if(!confirm('Clear the entire queue?')) return;
  queue=[]; saveQueue(); render(); toast('Queue cleared');
});
$('btnSortNewest').addEventListener('click',()=>{
  queue.sort((a,b)=>(b.addedAt||0)-(a.addedAt||0)); saveQueue(); render(); toast('Sorted newest first');
});

/* ─── Automation queue ─── */
$('btnStart').addEventListener('click',startQueue);
$('btnPause').addEventListener('click',()=>{
  isRunning=false; $('btnPause').style.display='none'; $('btnStart').style.display='flex';
  toast('Automation paused');
});

async function startQueue(){
  if(isRunning){toast('Automation already running');return;}
  const pending=queue.filter(j=>j.status==='pending');
  if(!pending.length){toast('No pending jobs in queue');return;}
  isRunning=true;
  $('btnStart').style.display='none'; $('btnPause').style.display='flex';
  toast(`▶ Starting automation for ${pending.length} job(s)`);
  await processQueue();
}

async function processQueue(){
  while(isRunning){
    const applied=await loadApplied();
    const appliedSet=new Set(applied.map(normalize));
    const job=queue.find(j=>j.status==='pending');
    if(!job){
      isRunning=false; $('btnPause').style.display='none'; $('btnStart').style.display='flex';
      toast('✅ Queue complete!'); render(); break;
    }
    // Check dedup
    if(appliedSet.has(normalize(job.url))){
      job.status='duplicate'; job.note='Already applied'; saveQueue(); render(); continue;
    }
    // Open tab
    job.status='running'; saveQueue(); render();
    let tab;
    try{ tab=await new Promise((res,rej)=>chrome.tabs.create({url:job.url,active:true},t=>chrome.runtime.lastError?rej(chrome.runtime.lastError):res(t))); }
    catch(e){ job.status='failed'; job.note=e.message||'Tab error'; saveQueue(); render(); await sleep(1000); continue; }
    runTabId=tab.id;
    // Wait for result via storage poll (robust, no message passing needed)
    const result=await waitForResult(job.id, tab.id, 90_000);
    runTabId=null;
    if(result==='success'){ job.status='done'; const a=await loadApplied(); a.push(normalize(job.url)); chrome.storage.local.set({[KEY_APPLIED]:a}); }
    else if(result==='duplicate'){ job.status='duplicate'; }
    else{ job.status='failed'; job.note=result||'No response'; }
    saveQueue(); render();
    try{ chrome.tabs.remove(tab.id); }catch(_){}
    await sleep(2500);
  }
}

function waitForResult(jobId, tabId, maxMs){
  return new Promise(res=>{
    const deadline=Date.now()+maxMs;
    // Listen for messages (won't throw even if SW is inactive)
    function onMsg(msg){
      if(!msg||msg.tabId!==tabId) return;
      if(msg.type==='APPLICATION_SUCCESS'||msg.type==='JOB_APPLIED'){ chrome.runtime.onMessage.removeListener(onMsg); clearTimeout(timer); res('success'); }
      if(msg.type==='ALREADY_APPLIED_SKIP'){ chrome.runtime.onMessage.removeListener(onMsg); clearTimeout(timer); res('duplicate'); }
      if(msg.type==='APPLICATION_FAILED'||msg.type==='JOB_FAILED'){ chrome.runtime.onMessage.removeListener(onMsg); clearTimeout(timer); res(msg.reason||'failed'); }
    }
    // Safely add listener
    try{ chrome.runtime.onMessage.addListener(onMsg); }catch(_){}
    // Also poll the job status in storage as fallback
    const poll=setInterval(async()=>{
      await loadQueue();
      const j=queue.find(q=>q.id===jobId);
      if(j&&j.status!=='running'){ clearInterval(poll); clearTimeout(timer); try{chrome.runtime.onMessage.removeListener(onMsg);}catch(_){} res(j.status==='done'?'success':j.status); }
    },4000);
    const timer=setTimeout(()=>{
      clearInterval(poll); try{chrome.runtime.onMessage.removeListener(onMsg);}catch(_){} res('timeout after 90s');
    },maxMs);
  });
}

/* ─── Import ─── */
$('btnAdd').addEventListener('click',()=>{
  const t=$('urlInput').value.trim();
  if(!t){toast('Paste at least one URL');return;}
  addUrls(parseUrls(t)); $('urlInput').value='';
});
$('urlInput').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter') $('btnAdd').click();});

$('csvFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>addUrls(parseUrls(ev.target.result)); r.readAsText(f);
  e.target.value='';
});

const dz=$('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{
  e.preventDefault(); dz.classList.remove('dragover');
  const f=e.dataTransfer.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>addUrls(parseUrls(ev.target.result)); r.readAsText(f);
});

/* ─── Export ─── */
function csvDownload(rows, name){
  const text=rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'})); a.download=name; a.click();
  toast('Downloaded: '+name);
}
$('btnExportQueue').addEventListener('click',()=>{
  csvDownload([['url','platform','status','addedAt','note'],...queue.map(j=>[j.url,j.platform,j.status,j.addedAt?new Date(j.addedAt).toISOString():'',j.note||''])],'optimhire-queue.csv');
});
$('btnExportApplied').addEventListener('click',()=>{
  loadApplied().then(a=>csvDownload([['url'],...a.map(u=>[u])],'optimhire-applied.csv'));
});

/* ─── Filter / search ─── */
$('searchInput').addEventListener('input',()=>{page=1;render();});
$('filterStatus').addEventListener('change',()=>{page=1;render();});

/* ─── Storage listener for real-time updates ─── */
chrome.storage.onChanged.addListener((changes,area)=>{
  if(area==='local'&&changes[KEY_QUEUE]){
    queue=changes[KEY_QUEUE].newValue||[];
    render();
  }
});

/* ─── Init ─── */
loadQueue().then(render);
</script>
