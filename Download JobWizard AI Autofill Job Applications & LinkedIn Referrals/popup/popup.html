<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobWizard</title>
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="popup.css">
  <style>
    /* Apply JobWizard font to popup elements */
    body,
    .content,
    h1,
    p,
    a {
      font-family: var(--jobwizard-font-family);
    }
  </style>
</head>

<body>
  <div class="content">
    <h1>Lucky you!<br>You triggered the secret button!</h1>
    <p>We designed JobWizard to pop up only on the relevant sites, such as job application sites.</p>
    <p>If you think JobWizard should help you with something now, <span class="underline-text">please let us know
        below!</span></p>
    <div class="contact-icons">
      <a href="https://discord.gg/Trzx8P9KkE" target="_blank" title="Contact us on Discord"><img
          src="asset/contact_discord.svg" alt="Discord"></a>
      <a href="https://www.linkedin.com/in/yara-n/" target="_blank" title="Contact us on LinkedIn"><img
          src="asset/contact_linkedin.svg" alt="LinkedIn"></a>
      <a href="https://twitter.com/JobWizard_AI" target="_blank" title="Contact us on Twitter"><img
          src="asset/contact_twitter.svg" alt="Twitter"></a>
    </div>
  </div>
</body>

</html>
