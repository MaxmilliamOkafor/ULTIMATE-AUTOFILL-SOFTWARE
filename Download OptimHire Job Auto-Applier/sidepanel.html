<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/tabs/missingDetails.df89bfed.css">
  <title>OptimHire Job Auto-Applier</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Hide referral / affiliate section in sidepanel */
    [class*="referral"],[class*="Referral"],[id*="referral"],
    [data-testid*="referral"],[class*="affiliate"],
    .referral-section,.referral-card,.referral-banner,
    [class*="earnCredit"],[class*="inviteFriend"],[class*="invite-friend"],
    [class*="ReferralScreen"]{display:none!important}

    /* Auto-Apply Mode bar at bottom */
    #oh-auto-apply-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:99999;
      background:#111827;border-top:1px solid #374151;
      padding:10px 14px;display:flex;align-items:center;gap:10px;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    #oh-auto-apply-bar .oh-bar-btn{
      display:flex;align-items:center;gap:6px;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:#fff;border:none;border-radius:8px;
      padding:8px 14px;font-size:12.5px;font-weight:600;
      cursor:pointer;white-space:nowrap;flex:1;justify-content:center;
      box-shadow:0 2px 8px rgba(37,99,235,.35);
      transition:transform .1s,box-shadow .15s;
    }
    #oh-auto-apply-bar .oh-bar-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.45)}
    #oh-auto-apply-bar .oh-bar-btn:active{transform:scale(.97)}
    #oh-auto-apply-bar .oh-bar-btn svg{flex-shrink:0}
    #oh-auto-apply-bar .oh-bar-info{
      font-size:11px;color:#9ca3af;white-space:nowrap;
    }
  </style>
</head>
<body>
  <div id="__plasmo"></div>
  <script src="/sidepanel.b7741352.js" defer></script>

  <!-- Auto-Apply Mode bar at bottom of sidepanel -->
  <div id="oh-auto-apply-bar">
    <button class="oh-bar-btn" id="oh-csv-btn" title="Open Auto-Apply Mode — Import CSV, manage queue, start bulk applying">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Auto-Apply Mode
    </button>
    <span class="oh-bar-info" id="oh-bar-stats"></span>
  </div>

  <script>
    /* Open Auto-Apply Mode page */
    document.getElementById('oh-csv-btn').addEventListener('click',function(){
      chrome.tabs.create({url:chrome.runtime.getURL('tabs/csvImport.html')});
    });

    /* Show queue stats */
    function updateBarStats(){
      chrome.storage.local.get('csvJobQueue',function(d){
        var q=d.csvJobQueue||[];
        var pending=q.filter(function(j){return j.status==='pending'}).length;
        var done=q.filter(function(j){return j.status==='done'}).length;
        var el=document.getElementById('oh-bar-stats');
        if(q.length) el.textContent=pending+' pending · '+done+' applied';
        else el.textContent='Import jobs to start';
      });
    }
    updateBarStats();
    chrome.storage.onChanged.addListener(function(c){if(c.csvJobQueue) updateBarStats();});

    /* MutationObserver fallback to kill any referral card React renders */
    new MutationObserver(function(){
      document.querySelectorAll('h2,h3,p,span').forEach(function(el){
        var t=el.textContent||'';
        if(t.includes('One Referral 3 Benefits')||t.includes('Get 20 Auto-fill Credits for every signup')){
          var node=el;
          for(var i=0;i<8;i++){
            if(!node.parentElement)break;
            node=node.parentElement;
            var c=node.className||'';
            if(typeof c==='string'&&(c.includes('bg-')||c.includes('border'))){
              node.style.cssText='display:none!important';break;
            }
          }
        }
      });
    }).observe(document.body,{childList:true,subtree:true});
  </script>
</body>
</html>
