<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/tabs/missingDetails.df89bfed.css">
  <title>OptimHire Job Auto-Applier</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Hide referral / affiliate section in sidepanel */
    [class*="referral"],[class*="Referral"],[id*="referral"],
    [data-testid*="referral"],[class*="affiliate"],
    .referral-section,.referral-card,.referral-banner,
    [class*="earnCredit"],[class*="inviteFriend"],[class*="invite-friend"],
    [class*="ReferralScreen"]{display:none!important}

    /* CSV Import button fixed at bottom-right of sidepanel */
    #oh-csv-btn{
      position:fixed;bottom:16px;right:16px;z-index:99999;
      display:flex;align-items:center;gap:6px;
      background:linear-gradient(135deg,#6b21a8,#9333ea);
      color:#fff;border:none;border-radius:24px;
      padding:9px 16px;font-size:13px;font-weight:700;
      cursor:pointer;box-shadow:0 4px 14px rgba(107,33,168,.5);
      transition:transform .15s,box-shadow .15s;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    #oh-csv-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(107,33,168,.6)}
  </style>
</head>
<body>
  <div id="__plasmo"></div>
  <script src="/sidepanel.b7741352.js" defer></script>

  <!-- CSV Import floating button -->
  <button id="oh-csv-btn" title="Open CSV Job Queue Manager">
    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    CSV Import
  </button>
  <script>
    document.getElementById('oh-csv-btn').addEventListener('click',function(){
      chrome.tabs.create({url:chrome.runtime.getURL('tabs/csvImport.html')});
    });
    // MutationObserver fallback to kill any referral card React renders
    new MutationObserver(function(){
      document.querySelectorAll('h2,h3,p,span').forEach(function(el){
        var t=el.textContent||'';
        if(t.includes('One Referral 3 Benefits')||t.includes('Get 20 Auto-fill Credits for every signup')){
          var node=el;
          for(var i=0;i<8;i++){
            if(!node.parentElement)break;
            node=node.parentElement;
            var c=node.className||'';
            if(typeof c==='string'&&(c.includes('bg-')||c.includes('border'))){
              node.style.cssText='display:none!important';break;
            }
          }
        }
      });
    }).observe(document.body,{childList:true,subtree:true});
  </script>
</body>
</html>
